<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
</head>
<body>
<h1>Регистрация</h1>

<form th:action="@{/auth/register}" th:object="${registerRequest}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    <div>
        <label>Email</label>
        <input type="email" th:field="*{email}">
        <div th:errors="*{email}"></div>
    </div>

    <div>
        <label>Имя</label>
        <input type="text" th:field="*{displayName}">
        <div th:errors="*{displayName}"></div>
    </div>

    <div>
        <label>Пароль</label>
        <input type="password" th:field="*{password}">
        <div th:errors="*{password}"></div>
    </div>

    <button type="submit">Зарегистрироваться</button>
</form>

<a th:href="@{/auth/login}">Назад ко входу</a>
</body>
</html>
