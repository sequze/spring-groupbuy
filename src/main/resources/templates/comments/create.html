<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle}">Создание комментария</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="shell">
    <header class="topbar">
        <a class="brand" th:href="@{/workspaces}">
            <span class="brand-mark">GB</span>
            <span>GroupBuy</span>
        </a>
        <nav class="nav">
            <a class="nav-link" th:href="@{/comments(workspaceId=${workspaceId})}">Комментарии</a>
            <a class="nav-link" th:href="@{/purchase-items(workspaceId=${workspaceId})}">Позиции</a>
        </nav>
    </header>

    <main class="page-shell">
        <section class="hero-card">
            <div class="eyebrow">Комментарий</div>
            <h1 class="page-title" th:text="${pageTitle}">Создание комментария</h1>
            <p class="page-copy">Добавьте уточнение, согласование или замечание по конкретной позиции закупки.</p>
        </section>

        <section class="panel">
            <form th:action="${formAction}" th:object="${commentForm}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-grid">
                    <div class="field-full">
                        <label for="purchaseItemId">Позиция закупки</label>
                        <select id="purchaseItemId" th:field="*{purchaseItemId}">
                            <option th:each="item : ${purchaseItems}" th:value="${item.id}" th:text="${item.title}"></option>
                        </select>
                        <div class="error-text" th:errors="*{purchaseItemId}"></div>
                    </div>

                    <div class="field-full">
                        <label for="content">Комментарий</label>
                        <textarea id="content" th:field="*{content}" rows="8" placeholder="Напишите мнение, решение или уточнение"></textarea>
                        <div class="error-text" th:errors="*{content}"></div>
                    </div>
                </div>

                <div class="page-actions">
                    <button class="button" type="submit">Сохранить</button>
                    <a class="button-secondary" th:href="@{/comments(workspaceId=${workspaceId})}">Назад</a>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
