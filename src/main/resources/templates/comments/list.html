<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Комментарии</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="shell">
    <header class="topbar">
        <a class="brand" th:href="@{/workspaces}">
            <span class="brand-mark">GB</span>
            <span>GroupBuy</span>
        </a>
        <nav class="nav">
            <a class="nav-link" th:href="@{/purchase-items(workspaceId=${workspaceId})}">Позиции</a>
            <a class="nav-link" th:href="@{/orders(workspaceId=${workspaceId})}">Заказы</a>
            <a class="nav-link" th:href="@{/workspaces}">Workspaces</a>
        </nav>
    </header>

    <main class="page-shell">
        <section class="hero-card">
            <div class="eyebrow">Комментарии</div>
            <h1 class="page-title">Обсуждение позиций</h1>
            <p class="page-copy">Фиксируйте решения по каждой позиции прямо в системе, чтобы не терять контекст по истории обсуждения.</p>
        </section>

        <div class="message" th:if="${successMessage}" th:text="${successMessage}"></div>

        <section class="panel">
            <div class="empty-state" th:if="${#lists.isEmpty(comments)}">Комментариев пока нет. Их можно добавить со страницы позиций закупки.</div>

            <div class="list-grid" th:if="${!#lists.isEmpty(comments)}">
                <article class="entity-card" th:each="comment : ${comments}">
                    <div class="entity-head">
                        <div>
                            <p class="entity-description" style="font-size:1.25rem; color:var(--text); margin-top:0;" th:text="${comment.content}"></p>
                            <div class="muted" style="font-size:0.92rem;" th:text="'Позиция: ' + ${comment.purchaseItemTitle}"></div>
                        </div>
                        <div class="badge-row">
                            <span class="badge" th:text="'ID ' + ${comment.id}"></span>
                            <span class="badge badge-success" th:if="${comment.edited}">Отредактировано</span>
                        </div>
                    </div>

                    <div class="data-grid">
                        <div class="data-point">
                            <strong>Автор</strong>
                            <span th:text="${comment.authorDisplayName}"></span>
                        </div>
                        <div class="data-point">
                            <strong>Позиция</strong>
                            <span th:text="${comment.purchaseItemTitle}"></span>
                        </div>
                        <div class="data-point">
                            <strong>Статус</strong>
                            <span th:text="${comment.edited ? 'Обновлен' : 'Исходный'}"></span>
                        </div>
                    </div>

                    <div class="card-actions">
                        <a class="button-secondary" th:if="${comment.canEdit}" th:href="@{/comments/{id}/edit(id=${comment.id},workspaceId=${workspaceId})}">Редактировать</a>
                        <form class="ghost-form" th:if="${comment.canDelete}" th:action="@{/comments/{id}/delete(id=${comment.id},workspaceId=${workspaceId})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button class="button-danger" type="submit">Удалить</button>
                        </form>
                    </div>
                </article>
            </div>
        </section>
    </main>
</div>
</body>
</html>
