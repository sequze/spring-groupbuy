<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle}">Редактирование заказа</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="shell">
    <header class="topbar">
        <a class="brand" th:href="@{/workspaces}">
            <span class="brand-mark">GB</span>
            <span>GroupBuy</span>
        </a>
        <nav class="nav">
            <a class="nav-link" th:href="@{/orders(workspaceId=${orderForm.workspaceId})}">Заказы</a>
            <a class="nav-link" th:href="@{/purchase-items(workspaceId=${orderForm.workspaceId})}">Позиции</a>
        </nav>
    </header>

    <main class="page-shell">
        <section class="hero-card">
            <div class="eyebrow">Редактирование</div>
            <h1 class="page-title" th:text="${pageTitle}">Редактирование заказа</h1>
            <p class="page-copy">Workspace зафиксирован. Можно менять только статус, метаданные заказа и набор позиций внутри этого пространства.</p>
            <div class="badge-row" th:if="${order}">
                <span class="badge" th:text="'ID ' + ${order.id}"></span>
                <span class="badge badge-accent" th:text="${order.workspaceName}"></span>
            </div>
        </section>

        <section class="panel">
            <form th:action="${formAction}" th:object="${orderForm}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-grid">
                    <div class="field-full">
                        <label>Workspace</label>
                        <div class="checkbox-field">
                            <span th:text="${order.workspaceName}"></span>
                            <span class="badge" th:text="'ID ' + ${order.workspaceId}"></span>
                        </div>
                    </div>

                    <div class="field-full">
                        <label for="title">Название</label>
                        <input id="title" type="text" th:field="*{title}">
                        <div class="error-text" th:errors="*{title}"></div>
                    </div>

                    <div class="field">
                        <label for="status">Статус</label>
                        <select id="status" th:field="*{status}">
                            <option th:each="status : ${statuses}" th:value="${status}" th:text="${status}"></option>
                        </select>
                        <div class="error-text" th:errors="*{status}"></div>
                    </div>

                    <div class="field-full">
                        <label for="description">Описание</label>
                        <textarea id="description" th:field="*{description}" rows="5"></textarea>
                        <div class="error-text" th:errors="*{description}"></div>
                    </div>
                </div>

                <div class="field-full" style="margin-top:22px;">
                    <label>Состав заказа</label>
                    <div class="table-wrap">
                        <table>
                            <thead>
                            <tr>
                                <th>Выбрать</th>
                                <th>Позиция</th>
                                <th>Цена</th>
                                <th>Количество</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${#lists.isEmpty(orderForm.items)}">
                                <td colspan="4">В workspace нет APPROVED-позиций для включения в заказ.</td>
                            </tr>
                            <tr th:each="option, itemStat : ${itemOptions}">
                                <td>
                                    <input type="hidden" th:field="*{items[__${itemStat.index}__].purchaseItemId}">
                                    <input type="checkbox" th:field="*{items[__${itemStat.index}__].selected}">
                                </td>
                                <td>
                                    <div class="table-title" th:text="${option.title}"></div>
                                    <div class="muted" th:if="${option.unit}" th:text="'Единица: ' + ${option.unit}"></div>
                                </td>
                                <td th:text="${option.priceLabel}"></td>
                                <td style="max-width:140px;">
                                    <input type="number" min="1" th:field="*{items[__${itemStat.index}__].quantity}">
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="error-text" th:if="${#fields.hasGlobalErrors()}" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
                </div>

                <div class="page-actions">
                    <button class="button" type="submit">Обновить заказ</button>
                    <a class="button-secondary" th:href="@{/orders(workspaceId=${orderForm.workspaceId})}">Назад</a>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
